<!doctype html>
<html><head><meta charset="utf-8"/><title>Character bio</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; background: #0F172A; font-family: var(--hotc-font-sans); color: #F1F5F9; padding: 20px; }
  .label { font-size: 10px; color: #94A3B8; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; margin-bottom: 14px; }
  .card { display: grid; grid-template-columns: 110px 1fr; gap: 18px; padding: 16px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.06); align-items: start; }
  .portrait { width: 110px; height: 140px; background: radial-gradient(ellipse at 50% 35%, #3a3026, #0F172A 80%); position: relative; overflow: hidden; }
  .portrait::after { content: ""; position: absolute; inset: 0; background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,0.6)); }
  .name { font-size: 22px; font-weight: 700; letter-spacing: -0.015em; line-height: 1.1; }
  .role { font-size: 11px; font-weight: 600; color: #D97757; letter-spacing: 0.12em; text-transform: uppercase; margin-top: 4px; }
  .bio { font-size: 13px; color: #CBD5E1; line-height: 1.55; margin-top: 10px; }
  .meta { display: flex; gap: 18px; margin-top: 12px; font-size: 11px; color: #94A3B8; }
  .meta b { color: #F1F5F9; font-weight: 600; display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 2px; }
</style></head>
<body>
  <div class="label">Character bio — world &amp; cast pages</div>
  <div class="card">
    <div class="portrait"></div>
    <div>
      <div class="role">Heir · Living</div>
      <div class="name">Mira of Ash-Hollow</div>
      <div class="bio">Cartographer's apprentice; the only living descendant of the Ember-tongue line. Carries her grandfather's compass even though it stopped pointing north the year the gods left.</div>
      <div class="meta">
        <div><b>First seen</b>Ch. 01</div>
        <div><b>Lineage</b>Ember-tongue</div>
        <div><b>Status</b>Living</div>
      </div>
    </div>
  </div>
</body></html>
