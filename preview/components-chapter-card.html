<!doctype html>
<html><head><meta charset="utf-8"/><title>Chapter card</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; background: #F1F5F9; font-family: var(--hotc-font-sans); padding: 24px; color: #0F172A; }
  .label { font-size: 10px; color: #64748B; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; margin-bottom: 14px; }
  .row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
  .card { background: #fff; box-shadow: 0 1px 2px rgba(15,23,42,0.06); display: flex; gap: 14px; padding: 12px; }
  .thumb { width: 88px; height: 110px; flex-shrink: 0; background: linear-gradient(135deg, #2a1f18, #0a0a08); position: relative; overflow: hidden; }
  .thumb::after { content: ""; position: absolute; inset: 0; background: radial-gradient(circle at 60% 30%, rgba(217,119,87,0.25), transparent 50%); }
  .body { display: flex; flex-direction: column; gap: 6px; min-width: 0; }
  .meta { font-size: 10px; font-weight: 700; color: #94A3B8; letter-spacing: 0.12em; text-transform: uppercase; }
  .title { font-size: 16px; font-weight: 700; line-height: 1.2; letter-spacing: -0.01em; }
  .blurb { font-size: 12px; color: #475569; line-height: 1.45; }
  .tag-row { display: flex; gap: 6px; margin-top: auto; }
  .tag { font-size: 10px; font-weight: 600; padding: 3px 8px; border-radius: 999px; background: #F1F5F9; color: #475569; }
  .tag.new { background: #D97757; color: #fff; }
</style></head>
<body>
  <div class="label">Chapter card — archive grid, recent updates</div>
  <div class="row">
    <div class="card">
      <div class="thumb"></div>
      <div class="body">
        <div class="meta">Ch. 12 · 24 pages</div>
        <div class="title">The First Heir</div>
        <div class="blurb">Mira returns to the ruins her mother forbade her to enter.</div>
        <div class="tag-row"><span class="tag new">New</span><span class="tag">Sun May 4</span></div>
      </div>
    </div>
    <div class="card">
      <div class="thumb" style="background:linear-gradient(135deg,#1a2a30,#0a0f12)"></div>
      <div class="body">
        <div class="meta">Ch. 11 · 28 pages</div>
        <div class="title">A god's-length silence</div>
        <div class="blurb">The cartographer learns why the southern road is unmapped.</div>
        <div class="tag-row"><span class="tag">Apr 27</span></div>
      </div>
    </div>
  </div>
</body></html>
