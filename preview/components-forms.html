<!doctype html>
<html><head><meta charset="utf-8"/><title>Forms &amp; inputs</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; background: #fff; font-family: var(--hotc-font-sans); color: #0F172A; padding: 22px 24px; }
  .label { font-size: 10px; color: #94A3B8; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; margin-bottom: 14px; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; align-items: end; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .ll { font-size: 11px; font-weight: 600; color: #475569; letter-spacing: 0.04em; }
  input, select { font: inherit; font-size: 13px; padding: 10px 12px; border: 1px solid #CBD5E1; background: #fff; color: #0F172A; border-radius: 2px; outline: none; }
  input:focus { border-color: #0F172A; box-shadow: 0 0 0 3px rgba(217,119,87,0.20); }
  .check { display: inline-flex; align-items: center; gap: 8px; font-size: 13px; }
  .box { width: 16px; height: 16px; border: 1.5px solid #334155; background: #fff; display: inline-flex; align-items: center; justify-content: center; }
  .box.on { background: #0F172A; border-color: #0F172A; color: #fff; font-size: 11px; font-weight: 700; }
  .help { font-size: 11px; color: #64748B; }
</style></head>
<body>
  <div class="label">Form inputs — newsletter, checkout, settings</div>
  <div class="row">
    <div class="field">
      <span class="ll">Email</span>
      <input value="reader@yourdomain.com"/>
      <span class="help">We email when a new chapter drops. No spam.</span>
    </div>
    <div class="field">
      <span class="ll">Reading mode</span>
      <select><option>Long-strip (scroll)</option><option>Single page</option><option>Two-page spread</option></select>
    </div>
  </div>
  <div style="margin-top:14px; display:flex; gap:18px;">
    <label class="check"><span class="box on">✓</span> Notify me on chapter release</label>
    <label class="check"><span class="box"></span> Include shop drops</label>
  </div>
</body></html>
