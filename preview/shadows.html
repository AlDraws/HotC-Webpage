<!doctype html>
<html><head><meta charset="utf-8"/><title>Shadows &amp; elevation</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; background: #F1F5F9; font-family: var(--hotc-font-sans); padding: 28px 24px; color: #0F172A; }
  .label { font-size: 10px; color: #64748B; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; margin-bottom: 18px; }
  .row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }
  .item { display: flex; flex-direction: column; gap: 8px; align-items: center; }
  .box { width: 110px; height: 70px; background: #fff; border-radius: 2px; }
  .tag { font-size: 11px; font-family: ui-monospace, monospace; color: #334155; font-weight: 600; }
  .px { font-size: 10px; color: #94A3B8; text-align: center; }
  .e1 { box-shadow: 0 1px 2px rgba(15,23,42,0.06), 0 1px 1px rgba(15,23,42,0.04); }
  .e2 { box-shadow: 0 4px 8px -2px rgba(15,23,42,0.10), 0 2px 4px -1px rgba(15,23,42,0.06); }
  .e3 { box-shadow: 0 12px 24px -8px rgba(15,23,42,0.18), 0 4px 8px -2px rgba(15,23,42,0.08); }
  .e4 { box-shadow: 0 24px 48px -12px rgba(15,23,42,0.30), 0 8px 16px -4px rgba(15,23,42,0.10); }
</style></head>
<body>
  <div class="label">Elevation — soft, low-contrast. Used sparingly</div>
  <div class="row">
    <div class="item"><div class="box e1"></div><div class="tag">shadow-1</div><div class="px">cards, chips</div></div>
    <div class="item"><div class="box e2"></div><div class="tag">shadow-2</div><div class="px">menus, tooltips</div></div>
    <div class="item"><div class="box e3"></div><div class="tag">shadow-3</div><div class="px">popovers, drawers</div></div>
    <div class="item"><div class="box e4"></div><div class="tag">shadow-4</div><div class="px">modals</div></div>
  </div>
</body></html>
