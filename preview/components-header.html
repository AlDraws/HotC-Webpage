<!doctype html>
<html><head><meta charset="utf-8"/><title>Site header</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; background: #0F172A; font-family: var(--hotc-font-sans); color: #F1F5F9; }
  .label { font-size: 10px; color: #94A3B8; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; padding: 18px 24px 0; }
  .header { display: flex; align-items: center; justify-content: space-between; padding: 16px 24px; border-bottom: 1px solid rgba(255,255,255,0.06); margin-top: 14px; }
  .left { display: flex; align-items: baseline; gap: 14px; }
  .logo { font-family: var(--hotc-font-display); font-weight: 700; font-size: 18px; letter-spacing: -0.02em; line-height: 1; }
  .logo .accent { color: #D97757; }
  .nav { display: flex; gap: 22px; font-size: 12px; font-weight: 500; }
  .nav a { color: #CBD5E1; text-decoration: none; padding: 6px 0; border-bottom: 1px solid transparent; }
  .nav a.active { color: #fff; border-bottom-color: #D97757; }
  .nav a:hover { color: #fff; }
  .right { display: flex; gap: 8px; align-items: center; }
  .icon-btn { width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center; color: #CBD5E1; }
  .icon-btn:hover { color: #fff; }
  .icon-btn svg { width: 16px; height: 16px; }
  .cta { background: #D97757; color: #fff; font-size: 12px; font-weight: 500; padding: 8px 14px; border: none; cursor: pointer; }
</style></head>
<body>
  <div class="label">Site header — primary chrome</div>
  <header class="header">
    <div class="left">
      <div class="logo">HEIRS OF THE <span class="accent">COLLAPSE</span></div>
    </div>
    <nav class="nav">
      <a class="active">Read</a><a>Archive</a><a>World</a><a>Cast</a><a>Shop</a><a>About</a>
    </nav>
    <div class="right">
      <button class="icon-btn" title="Search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg></button>
      <button class="icon-btn" title="Cart"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg></button>
      <button class="cta">Read latest</button>
    </div>
  </header>
</body></html>
