<!doctype html>
<html><head><meta charset="utf-8"/><title>Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; background: #fff; font-family: var(--hotc-font-sans); padding: 22px 24px; color: #0F172A; }
  .label { font-size: 10px; color: #94A3B8; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; margin-bottom: 14px; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .btn { display: inline-flex; align-items: center; gap: 8px; font-family: inherit; font-size: 13px; font-weight: 500; padding: 10px 18px; border-radius: 2px; border: 1px solid transparent; cursor: pointer; transition: background 120ms ease, border-color 120ms ease; }
  .btn-primary { background: #D97757; color: #fff; }
  .btn-primary:hover { background: #B85A3D; }
  .btn-secondary { background: #0F172A; color: #fff; }
  .btn-secondary:hover { background: #1E293B; }
  .btn-ghost { background: transparent; color: #0F172A; border-color: #CBD5E1; }
  .btn-ghost:hover { background: #F1F5F9; border-color: #94A3B8; }
  .btn-link { color: #0F172A; padding: 0; background: transparent; border: none; text-decoration: underline; text-decoration-thickness: 1px; text-underline-offset: 4px; text-decoration-color: #D97757; }
  .arrow { width: 14px; height: 14px; }
  .group-label { font-size: 10px; color: #64748B; font-family: ui-monospace, monospace; margin: 14px 0 8px; }
</style></head>
<body>
  <div class="label">Buttons — sharp corners, restrained palette</div>
  <div class="group-label">Default</div>
  <div class="row">
    <button class="btn btn-primary">Read latest <svg class="arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M13 5l7 7-7 7"/></svg></button>
    <button class="btn btn-secondary">Browse archive</button>
    <button class="btn btn-ghost">About the world</button>
    <button class="btn btn-link">View shop →</button>
  </div>
</body></html>
