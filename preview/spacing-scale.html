<!doctype html>
<html><head><meta charset="utf-8"/><title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; background: #fff; font-family: var(--hotc-font-sans); padding: 20px 24px; color: #0F172A; }
  .label { font-size: 10px; color: #94A3B8; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; margin-bottom: 14px; }
  .row { display: grid; grid-template-columns: 50px 80px 1fr; gap: 12px; align-items: center; padding: 4px 0; }
  .tag { font-size: 11px; font-family: ui-monospace, monospace; color: #334155; }
  .px { font-size: 10px; font-family: ui-monospace, monospace; color: #94A3B8; }
  .bar { background: #D97757; height: 14px; border-radius: 2px; }
</style></head>
<body>
  <div class="label">Spacing — 4px base unit, multiples used for stacks &amp; rhythm</div>
  <div class="row"><span class="tag">space-1</span><span class="px">4px</span><div class="bar" style="width:4px"></div></div>
  <div class="row"><span class="tag">space-2</span><span class="px">8px</span><div class="bar" style="width:8px"></div></div>
  <div class="row"><span class="tag">space-3</span><span class="px">12px</span><div class="bar" style="width:12px"></div></div>
  <div class="row"><span class="tag">space-4</span><span class="px">16px</span><div class="bar" style="width:16px"></div></div>
  <div class="row"><span class="tag">space-6</span><span class="px">24px</span><div class="bar" style="width:24px"></div></div>
  <div class="row"><span class="tag">space-8</span><span class="px">32px</span><div class="bar" style="width:32px"></div></div>
  <div class="row"><span class="tag">space-12</span><span class="px">48px</span><div class="bar" style="width:48px"></div></div>
  <div class="row"><span class="tag">space-16</span><span class="px">64px</span><div class="bar" style="width:64px"></div></div>
  <div class="row"><span class="tag">space-24</span><span class="px">96px</span><div class="bar" style="width:96px"></div></div>
</body></html>
