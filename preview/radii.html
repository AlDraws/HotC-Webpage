<!doctype html>
<html><head><meta charset="utf-8"/><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; background: #fff; font-family: var(--hotc-font-sans); padding: 20px 24px; color: #0F172A; }
  .label { font-size: 10px; color: #94A3B8; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; margin-bottom: 14px; }
  .row { display: flex; gap: 22px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; gap: 6px; align-items: center; }
  .box { width: 64px; height: 64px; background: #0F172A; border: 1px solid #1E293B; }
  .tag { font-size: 11px; font-family: ui-monospace, monospace; color: #334155; font-weight: 600; }
  .px { font-size: 10px; font-family: ui-monospace, monospace; color: #94A3B8; }
  .note { margin-top: 12px; font-size: 11px; color: #64748B; line-height: 1.5; max-width: 60ch; }
</style></head>
<body>
  <div class="label">Radii — sparing. The brand defaults to sharp corners</div>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:0"></div><div class="tag">none</div><div class="px">0px</div></div>
    <div class="item"><div class="box" style="border-radius:2px"></div><div class="tag">sm</div><div class="px">2px</div></div>
    <div class="item"><div class="box" style="border-radius:4px"></div><div class="tag">md</div><div class="px">4px</div></div>
    <div class="item"><div class="box" style="border-radius:8px"></div><div class="tag">lg</div><div class="px">8px</div></div>
    <div class="item"><div class="box" style="border-radius:9999px"></div><div class="tag">pill</div><div class="px">999px</div></div>
  </div>
  <p class="note">Default to <b>none</b> for panels, comic frames, and CTAs — it's the right tonal fit. Reserve <b>md/lg</b> for soft UI like avatars and hover popovers; <b>pill</b> for chapter-tag chips and avatars.</p>
</body></html>
