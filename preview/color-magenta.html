<!doctype html>
<html><head><meta charset="utf-8"/><title>Color · Magenta</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; background: #F5EFE6; font-family: var(--hotc-font-sans); padding: 24px; }
  .head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 18px; }
  .h { font-family: var(--hotc-font-display); font-size: 28px; color: #0B0B0E; letter-spacing: 0.02em; }
  .pill { display: inline-block; background: #E8336E; color: #fff; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; padding: 4px 10px; border-radius: 999px; border: 2px solid #0B0B0E; }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .chip { height: 96px; border: 3px solid #0B0B0E; border-radius: 6px; box-shadow: 4px 4px 0 #0B0B0E; position: relative; }
  .chip .name { position: absolute; bottom: 6px; left: 8px; font-size: 10px; font-weight: 700; color: #0B0B0E; background: #F5EFE6; padding: 2px 6px; border: 2px solid #0B0B0E; }
  .meta { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-top: 8px; }
  .meta div { font-size: 10px; color: #4A4135; font-family: ui-monospace, monospace; }
  .note { font-size: 12px; color: #4A4135; line-height: 1.55; margin-top: 18px; max-width: 60ch; }
</style></head>
<body>
  <div class="head"><div class="h">Magenta · alarm</div><span class="pill">From the comic</span></div>
  <div class="row">
    <div class="chip" style="background:#FCE8EE"><span class="name">magenta-50</span></div>
    <div class="chip" style="background:#F1799C"><span class="name">magenta-300</span></div>
    <div class="chip" style="background:#E8336E"><span class="name">magenta</span></div>
    <div class="chip" style="background:#C71F58"><span class="name">magenta-600</span></div>
    <div class="chip" style="background:#9B1644"><span class="name">magenta-700</span></div>
  </div>
  <div class="meta"><div>#FCE8EE</div><div>#F1799C</div><div>#E8336E</div><div>#C71F58</div><div>#9B1644</div></div>
  <p class="note">Magenta (#E8336E) extracted from sunset skies and alarm-state panels (BLAM scenes). Used sparingly — destructive CTAs, late-stage chapter beats, hero gradients.</p>
</body></html>
