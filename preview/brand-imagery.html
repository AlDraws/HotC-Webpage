<!doctype html>
<html><head><meta charset="utf-8"/><title>Brand · imagery</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; background: #fff; font-family: var(--hotc-font-sans); color: #0F172A; padding: 0; }
  .label { font-size: 10px; color: #94A3B8; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; padding: 18px 20px 10px; }
  .row { display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: 0; height: 240px; }
  .tile { background-size: cover; background-position: center; position: relative; overflow: hidden; }
  .a { background-image: linear-gradient(180deg, transparent 50%, rgba(0,0,0,0.7)), linear-gradient(135deg, #2a1f18, #1a1410, #0a0a08); }
  .b { background-image: linear-gradient(135deg, #1a2a30, #0a0f12); }
  .c { background-image: linear-gradient(180deg, #3a3026, #0F172A); }
  .a::after { content: ""; position: absolute; left: 50%; top: 60%; width: 8px; height: 30px; background: #181410; transform: translateX(-50%); }
  .b::after { content: "ASH-HOLLOW"; position: absolute; left: 16px; bottom: 12px; color: #fff; font-weight: 700; font-size: 13px; letter-spacing: 0.16em; }
  .a::before { content: "ASH AT DUSK"; position: absolute; left: 16px; bottom: 12px; color: #fff; font-weight: 700; font-size: 13px; letter-spacing: 0.16em; z-index: 2; }
  .c::after { content: "EMBER"; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); color: #D97757; font-weight: 700; letter-spacing: 0.2em; font-size: 12px; }
</style></head>
<body>
  <div class="label">Imagery — desaturated, warm-shadow palette · ember as the only true chroma</div>
  <div class="row">
    <div class="tile a"></div>
    <div class="tile b"></div>
    <div class="tile c"></div>
  </div>
</body></html>
