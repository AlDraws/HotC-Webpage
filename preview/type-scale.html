<!doctype html>
<html><head><meta charset="utf-8"/><title>Type · Scale</title>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin: 0; background: #fff; font-family: var(--hotc-font-sans); padding: 20px 24px; color: #0F172A; }
  .label { font-size: 10px; color: #94A3B8; text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; margin-bottom: 12px; }
  .row { display: grid; grid-template-columns: 60px 1fr 110px; gap: 16px; align-items: baseline; padding: 4px 0; border-bottom: 1px dashed #E2E8F0; }
  .tag { font-size: 10px; font-family: ui-monospace, monospace; color: #64748B; }
  .px { font-size: 10px; font-family: ui-monospace, monospace; color: #94A3B8; text-align: right; font-variant-numeric: tabular-nums; }
  .specimen { letter-spacing: -0.01em; }
  .note { margin-top: 16px; font-size: 11px; color: #64748B; line-height: 1.5; max-width: 64ch; }
  .note code { font-family: ui-monospace, monospace; background: #F1F5F9; padding: 1px 5px; border-radius: 2px; color: #334155; }
</style></head>
<body>
  <div class="label">Modular scale — 1.25 ratio, body anchored at 15px · Inter variable</div>
  <div class="row"><span class="tag">5xl</span><span class="specimen" style="font-size:48px;font-weight:700;letter-spacing:-0.025em;font-variation-settings:'opsz' 32">Aa Æg</span><span class="px">48 / 700</span></div>
  <div class="row"><span class="tag">4xl</span><span class="specimen" style="font-size:36px;font-weight:700;letter-spacing:-0.02em;font-variation-settings:'opsz' 28">Aa Æg</span><span class="px">36 / 700</span></div>
  <div class="row"><span class="tag">3xl</span><span class="specimen" style="font-size:28px;font-weight:700;font-variation-settings:'opsz' 22">Aa Æg</span><span class="px">28 / 700</span></div>
  <div class="row"><span class="tag">2xl</span><span class="specimen" style="font-size:22px;font-weight:600">Aa Æg</span><span class="px">22 / 600</span></div>
  <div class="row"><span class="tag">xl</span><span class="specimen" style="font-size:18px;font-weight:600">Aa Æg</span><span class="px">18 / 600</span></div>
  <div class="row"><span class="tag">base</span><span class="specimen" style="font-size:15px;font-weight:400">Aa Æg</span><span class="px">15 / 400</span></div>
  <div class="row"><span class="tag">sm</span><span class="specimen" style="font-size:13px;font-weight:400">Aa Æg</span><span class="px">13 / 400</span></div>
  <div class="row"><span class="tag">xs</span><span class="specimen" style="font-size:11px;font-weight:500;letter-spacing:0.04em;text-transform:uppercase">Aa Æg</span><span class="px">11 / 500</span></div>
  <div class="note">Variable axes: <code>wght</code> 100–900, <code>opsz</code> 14–32. Tune <code>opsz</code> up for display, leave at 14 for body.</div>
</body></html>
